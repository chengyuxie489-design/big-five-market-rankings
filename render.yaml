services:
  - type: web
    name: big-five-market-rankings
    runtime: node
    plan: free
    buildCommand: ""
    startCommand: "node server.mjs"
    healthCheckPath: /health
    envVars:
      - key: CACHE_TTL_MS
        value: "1800000"
      - key: BACKGROUND_REFRESH_MS
        value: "3600000"
      - key: UPSTREAM_TIMEOUT_MS
        value: "12000"
